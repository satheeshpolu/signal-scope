<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalScope – Real-Time Market Instruments</title>
    <meta
      name="description"
      content="Browse, search, and analyze real-time market instruments and price signals with SignalScope."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SignalScope" />
    <meta
      property="og:description"
      content="Real-time market instruments and price signal analysis."
    />
    <meta property="og:url" content="https://your-domain.com" />
    <meta property="og:image" content="https://your-domain.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SignalScope" />
    <meta
      name="twitter:description"
      content="Real-time market instruments and price signal analysis."
    />
    <!--
      Anti-flash theme script: runs synchronously before the first paint so
      the page never flashes the wrong theme. Reads from localStorage first,
      then falls back to the OS preference.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
