services:
  # ── dev server ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      # named volume shadows host node_modules — no host install needed
      - node_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=development
      # polling required for HMR on macOS / Windows Docker Desktop
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host

  # ── nginx preview ──────────────────────────────────────────────────────────
  preview:
    build:
      context: .
      target: preview
    ports:
      - '8080:80'

volumes:
  # Isolated container node_modules — never touches host node_modules
  node_modules:
